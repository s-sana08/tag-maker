function convertToEntities(Text) {
      
      // encodeInput = $("#txtoptiontags").val();
      var inputTxt = Text;
      var convertedTxt = '';
      for (i = 0; i < inputTxt.length; i++) {
          if (inputTxt.charCodeAt(i) > 127) {
              convertedTxt += '&#' + inputTxt.charCodeAt(i) + ';';
          }
          else {
              convertedTxt += inputTxt.charAt(i);
          }
      }
      return convertedTxt;
                 
  }

function GenerateList()
{

  const textareaValue = $('#txtEnterList').val();
  const RstArray = textareaValue.split('\n');
  var str = "";
  if(textareaValue!=""){
  if(RstArray!=""){
  str+=`<ul>\n`;
  
  for (let i = 0; i < RstArray.length; i++) {
    const value = convertToEntities(RstArray[i]);
        if(value!=""){
           str+=`<li>${value}</li>\n`;
        }
  }

  str+=`</ul>`;
} 
  $("#txtResult").val(str);

}

else
{
alertify.error("Please enter UL list");
}


}

/// URL maker


function Generateurl()
{

  const textareaurlValue = $('#txturlvalue').val();
  const textareaurlValue1 = $('#txtAvalue').val();
  const UrlArray = textareaurlValue.split('\n');
  const UrlAArray = textareaurlValue1.split('\n');
  var checkBox = document.getElementById("chktBlank");
  var str = "";

  if(textareaurlValue!=""){
 
  for (let i = 0; i < UrlArray.length; i++) {
    const value = UrlArray[i]
    const Avalue = convertToEntities(UrlAArray[i]);

    if(checkBox.checked == true){
        if(value!=""){
          
         
          str+=`<a href='${value}' target='_blank'>${Avalue}</a>`;
        }
        }else if(value!=""){
            str+=`<a href='${value}'>${Avalue}</a>`;
        }
      

  } 
 
  $("#txturlResult").val(str);

}else
{
alertify.error("Please enter URL");
}


}

function GenerateOpt(){

for (let i = 0; i < valuesArray.length; i++) {
const value = valuesArray[i].split('&').join('and').split('+').join(' plus');    // Remove leading/trailing whitespace
const MainText = convertToEntities(convertedTxtt[i]); // Remove leading/trailing whitespace

}

$("#txtoptiontagsfinal").val(str);

{

function GenerateChk(){

  const textareaValue = $('#txtchkValue').val();
  var convertedTxt1 = $("#txtPvalue").val();
  var chkButtonId = $("#txtchkButtonId").val();
  var chkId = $("#txtchkId").val();
  var dataValue = $("#txtdataValue").val();
  var convertedTxt =convertToEntities(convertedTxt1);


  const valuesArray = textareaValue.split('\n');
  var str = "";
  var str = "";
  var jsc = "";
  var MainText = "";


  str+=` <section style="">\n`;
    if(convertedTxt!=""){
        str+=`<p style='margin-bottom: 15px;'>${convertedTxt}<span class='hs-form-required' data-reactid=''.hbspt-forms-0.1:$2.0.1'>*</span></p> \n`;

    }

  if(textareaValue!="" && chkButtonId!="" && chkId!="" && dataValue!=""){
    
    jsc +=`$('#${chkButtonId}').on('click', function () { \n if (`;

    for (let i = 0; i < valuesArray.length; i++) {
      MainText++;
      
      const value = convertToEntities(valuesArray[i]);   

      if(value!=""){
        str+=`<label style='display: block;margin-left: 18px; padding-bottom: 5px; font-size: 15px !important;line-height: 1.5;'>
        <input type='checkbox' value='${value}' name='data[${dataValue}]' id='${chkId}${MainText}' style='width: 15px !important; height: auto !important; margin:0 0 3px -18px !important;'>
        ${value}
        </label>\n`;

       
       
        jsc +=`${chkId}${MainText}.checked `;
       
       
       if(MainText < valuesArray.length){
        jsc +=`|| `;
      
       }
      }
      dataValue++;      
    }


  

    
    jsc +=`) {
           document.getElementById('${chkId}1').required = false;
       } else {
           document.getElementById('${chkId}1').required = true;
       }
   });`;

    str+=` </section>\n`;
    $("#txtCopyHTMLCode").val(str);
    $("#txtJSCode").val(jsc);

  }else
  {
  alertify.error("Please Fill All Values");
  }

}
